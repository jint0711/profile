<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body{
    background:#1a1a2e;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
}

.box{
    background:#2d3250;
    padding:30px;
    border-radius:20px;
    width:350px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="box">

<h2 style="color:white">Admin Login</h2>

<input id="username" placeholder="Tên đăng nhập">

<input id="password"
type="password"
placeholder="Mật khẩu">

<button onclick="login()">
Đăng nhập
</button>

</div>

<script>

const ADMIN_USER = "admin";
const ADMIN_PASS = "thu07112003";

function login(){

    const user =
    document.getElementById("username").value;

    const pass =
    document.getElementById("password").value;

    if(
        user === ADMIN_USER &&
        pass === ADMIN_PASS
    ){

        localStorage.setItem(
            "isAdmin",
            "true"
        );

        location.href =
        "formbaiviet.html";

    }else{

        alert(
            "Sai tài khoản hoặc mật khẩu"
        );

    }

}

</script>

</body>
</html>
